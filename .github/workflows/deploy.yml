name: Deploy to Cloudflare

# Deploys AirLock to Cloudflare Workers on every push to main.
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN  — "Edit Cloudflare Workers" token
#   CLOUDFLARE_ACCOUNT_ID — from your Workers dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install

      # Verify the published hashes still match before deploying. If someone
      # edited an editor file without refreshing SHA256SUMS.txt, fail the build
      # rather than ship an unverifiable artifact.
      - name: Verify editor hashes
        run: |
          cd public
          sha256sum -c SHA256SUMS.txt

      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
